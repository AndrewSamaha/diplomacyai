    <jdipNS:PROVINCE name="aab"><jdipNS:UNIT x="406" y="250"/><jdipNS:DISLODGED_UNIT x="418" y="238"/><jdipNS:SUPPLY_CENTER x="406" y="250"/></jdipNS:PROVINCE>
